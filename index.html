<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Northline Studio creates professional React websites with clean strategy, premium design, and scroll-led storytelling."
    />
    <title>Northline Studio | Professional Website Maker</title>
    <style>
      html,
      body {
        margin: 0;
        background: #d9d7d3;
      }

      body.preload-lock {
        overflow: hidden;
      }

      #root {
        min-height: 100vh;
      }

      .entry-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        padding: clamp(18px, 2.4vw, 32px);
        background: #d9d7d3;
        transform: translateY(0);
        transition: transform 0.95s cubic-bezier(0.77, 0, 0.175, 1);
      }

      body.preload-complete .entry-loader {
        transform: translateY(-108%);
      }

      .entry-loader__stage {
        position: relative;
        flex: 1;
        overflow: hidden;
        background: #f7f6f2;
        border: 1px solid rgba(17, 17, 17, 0.08);
      }

      .entry-loader__headline,
      .entry-loader__status,
      .entry-loader__menu,
      .entry-loader__scroll,
      .entry-loader__brand,
      .entry-loader__diagram {
        opacity: 0;
        animation: loader-fade-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .entry-loader__headline {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        color: #111111;
        font-family: "Segoe UI", sans-serif;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        animation-delay: 0.08s;
      }

      .entry-loader__status {
        position: absolute;
        top: 14px;
        right: 14px;
        display: grid;
        justify-items: end;
        gap: 2px;
        color: rgba(17, 17, 17, 0.58);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 0.76rem;
        line-height: 1.15;
        text-align: right;
        animation-delay: 0.14s;
      }

      .entry-loader__menu {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #111111;
        font-family: "Segoe UI", sans-serif;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        animation-delay: 0.22s;
      }

      .entry-loader__scroll {
        position: absolute;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        color: #111111;
        font-family: "Segoe UI", sans-serif;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        animation-delay: 0.3s;
      }

      .entry-loader__brand {
        position: absolute;
        left: clamp(18px, 4.6vw, 72px);
        top: 50%;
        margin: 0;
        transform: translateY(-8%);
        max-width: 9ch;
        color: #111111;
        font-family: "Segoe UI", sans-serif;
        font-size: clamp(2.4rem, 4.9vw, 4.1rem);
        font-weight: 500;
        line-height: 0.98;
        letter-spacing: -0.05em;
        animation-delay: 0.18s;
      }

      .entry-loader__diagram {
        position: absolute;
        left: 57%;
        top: 50%;
        width: min(18vw, 236px);
        min-width: 170px;
        aspect-ratio: 0.72;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(17, 17, 17, 0.26);
        animation-delay: 0.24s;
      }

      .entry-loader__line {
        position: absolute;
        background: rgba(17, 17, 17, 0.24);
      }

      .entry-loader__line--vertical {
        top: 0;
        bottom: 0;
        left: 38%;
        width: 1px;
      }

      .entry-loader__line--horizontal {
        left: 0;
        right: 0;
        top: 50%;
        height: 1px;
      }

      .entry-loader__line--diagonal {
        left: 50%;
        top: 50%;
        width: 1px;
        height: 146%;
        transform: translate(-50%, -50%) rotate(-37deg);
        transform-origin: center;
        animation: loader-diagonal-shift 1.55s cubic-bezier(0.65, 0, 0.35, 1) infinite alternate;
      }

      @keyframes loader-fade-up {
        from {
          opacity: 0;
          filter: blur(6px);
        }
        to {
          opacity: 1;
          filter: blur(0);
        }
      }

      @keyframes loader-diagonal-shift {
        0% {
          transform: translate(-50%, -50%) rotate(-37deg);
        }
        100% {
          transform: translate(-50%, -50%) rotate(42deg);
        }
      }

      @media (max-width: 900px) {
        .entry-loader__brand {
          left: 24px;
          top: calc(50% + 110px);
          transform: translateY(0);
          max-width: none;
          font-size: clamp(2.2rem, 7vw, 3.4rem);
        }

        .entry-loader__diagram {
          left: 50%;
          top: 42%;
          width: min(34vw, 220px);
        }
      }

      @media (max-width: 640px) {
        .entry-loader {
          padding: 12px;
        }

        .entry-loader__headline,
        .entry-loader__status,
        .entry-loader__menu,
        .entry-loader__scroll {
          font-size: 0.72rem;
        }

        .entry-loader__brand {
          left: 18px;
          right: 18px;
          top: auto;
          bottom: 84px;
          font-size: clamp(2rem, 10vw, 3rem);
        }

        .entry-loader__diagram {
          left: 50%;
          top: 42%;
          width: min(48vw, 180px);
          min-width: 150px;
        }

        .entry-loader__menu {
          right: 12px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .entry-loader,
        .entry-loader * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="entry-loader" id="entry-loader" role="status" aria-live="polite" aria-label="Loading TriZen Studio">
      <div class="entry-loader__stage">
        <div class="entry-loader__headline">Design Intelligence</div>
        <div class="entry-loader__status">
          <span id="entry-loader-progress">Loading 00%</span>
          <span id="entry-loader-clock">00:00:00</span>
        </div>
        <div class="entry-loader__menu">Menu</div>
        <h1 class="entry-loader__brand">TriZen Studio</h1>
        <div class="entry-loader__diagram" aria-hidden="true">
          <span class="entry-loader__line entry-loader__line--vertical"></span>
          <span class="entry-loader__line entry-loader__line--horizontal"></span>
          <span class="entry-loader__line entry-loader__line--diagonal"></span>
        </div>
        <div class="entry-loader__scroll">Scroll</div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      (() => {
        const loader = document.getElementById('entry-loader');

        if (!loader) {
          return;
        }

        const reduceMotion =
          typeof window.matchMedia === 'function' &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        const body = document.body;
        const progressEl = document.getElementById('entry-loader-progress');
        const clockEl = document.getElementById('entry-loader-clock');
        const startedAt = Date.now();
        const minDuration = reduceMotion ? 120 : 1200;
        const exitDuration = reduceMotion ? 40 : 1000;
        let progress = reduceMotion ? 100 : 4;
        let finished = false;
        let clockTimer;

        const renderClock = () => {
          if (!clockEl) {
            return;
          }

          const now = new Date();
          const time = now.toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false,
          });

          clockEl.textContent = time;
        };

        const renderProgress = () => {
          if (!progressEl) {
            return;
          }

          progressEl.textContent = `Loading ${String(progress).padStart(2, '0')}%`;
        };

        body.classList.add('preload-lock');
        renderClock();
        renderProgress();

        clockTimer = window.setInterval(renderClock, 1000);

        const ticker = reduceMotion
          ? null
          : window.setInterval(() => {
              if (finished || progress >= 96) {
                return;
              }

              if (progress < 36) {
                progress = Math.min(96, progress + 7);
              } else if (progress < 72) {
                progress = Math.min(96, progress + 4);
              } else {
                progress = Math.min(96, progress + 2);
              }

              renderProgress();
            }, 90);

        const cleanup = () => {
          if (ticker) {
            window.clearInterval(ticker);
          }

          if (clockTimer) {
            window.clearInterval(clockTimer);
          }
        };

        const finish = () => {
          if (finished) {
            return;
          }

          finished = true;
          cleanup();

          const remaining = Math.max(0, minDuration - (Date.now() - startedAt));

          window.setTimeout(() => {
            progress = 100;
            renderProgress();
            body.classList.add('preload-complete');
            body.classList.remove('preload-lock');

            window.setTimeout(() => {
              loader.remove();
            }, exitDuration);
          }, remaining);
        };

        window.addEventListener('load', finish, { once: true });
        window.setTimeout(finish, reduceMotion ? 200 : 4200);
      })();
    </script>

    <noscript>
      <style>
        #entry-loader {
          display: none !important;
        }
      </style>
    </noscript>

    <script type="module" src="/index.jsx"></script>
  </body>
</html>
